{% extends "base_anonymizer.html" %}
{% block content %}
    <style>
        /* --------------------------------------------------------------
           Anonymization page styling (inspired by chat.html)
        -------------------------------------------------------------- */
        .anon-shell {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 1rem;
        }

        .anon-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.1rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
        }

        .anon-title h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.2px;
        }

        .anon-title .sub {
            margin-top: 0.35rem;
            opacity: 0.75;
            font-size: 0.9rem;
            line-height: 1.2rem;
        }

        .btnx {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: inherit;
            border-radius: 12px;
            padding: 0.55rem 0.8rem;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, opacity 120ms ease;
            font-weight: 600;
            line-height: 1;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btnx:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        .btnx:active {
            transform: translateY(0px);
            opacity: 0.92;
        }

        .btnx.primary {
            border-color: rgba(99, 179, 237, 0.30);
            background: rgba(99, 179, 237, 0.16);
        }

        .btnx.primary:hover {
            background: rgba(99, 179, 237, 0.22);
            border-color: rgba(99, 179, 237, 0.42);
        }

        .anon-composer {
            padding: 1rem 1.1rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
            display: grid;
            gap: 0.75rem;
        }

        .composer-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
        }

        .composer-controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.8rem;
            align-items: center;
        }

        .controls-left {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }

        .selectx {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: inherit;
            padding: 0.55rem 0.7rem;
            min-width: 220px;
            outline: none;
        }

        .inputx {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: inherit;
            padding: 0.85rem 0.9rem;
            outline: none;
            resize: vertical;
            min-height: 120px;
            line-height: 1.35rem;
        }

        .inputx:focus, .selectx:focus {
            border-color: rgba(99, 179, 237, 0.40);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.16);
        }

        .right-actions {
            display: inline-flex;
            gap: 0.6rem;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .spinnerx {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.20);
            border-top-color: rgba(255, 255, 255, 0.85);
            display: none;
            animation: spin 0.8s linear infinite;
        }

        .spinnerx.active {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .anon-board {
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.03);
            overflow: hidden;
            min-height: 200px;
        }

        .anon-output {
            padding: 1rem;
        }

        .bubble {
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.05);
            line-height: 1.45rem;
            overflow-wrap: anywhere;
        }

        /* Highlight anonymized tags like {TAGNAME} */
        .anon-tag {
            display: inline-block;
            padding: 0.05rem 0.35rem;
            border-radius: 9px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 220, 120, 0.14);
            color: inherit;
            font-weight: 800;
            letter-spacing: 0.2px;
            box-shadow: 0 0 0 2px rgba(255, 220, 120, 0.08) inset;
            white-space: nowrap;
        }

        @media (min-width: 820px) {
            .composer-controls {
                grid-template-columns: 1fr auto;
            }
        }
    </style>

    <div class="anon-shell">
        <!-- Header -->
        <div class="anon-header">
            <div class="anon-title">
                <h2>🔒 Text Anonymization</h2>
                <div class="sub">
                    Szybkie usuwanie danych wrażliwych z tekstu przed wysłaniem go do LLM.
                </div>
            </div>
        </div>

        <!-- Form / Composer -->
        <form id="anonymize-form"
              hx-post="{{ url_for('anonymize_web.process_text') }}"
              hx-target="#result-container"
              hx-swap="innerHTML"
              hx-trigger="submit"
              hx-indicator="#loading-spinner"
              class="anon-composer">

            <div class="composer-row">
                <label for="input-text" style="opacity:0.85; font-weight:700;">Tekst do anonimizacji</label>
                <textarea id="input-text" name="text"
                          placeholder="Wklej tekst tutaj…" required
                          class="inputx"></textarea>
            </div>

            <div class="composer-controls">
                <div class="controls-left">
                    <select id="algorithm-select" name="algorithm" class="selectx">
                        <option value="fast" selected>Fast Masking</option>
                    </select>
                    <span id="loading-spinner" class="spinnerx" aria-live="polite"></span>
                </div>

                <div class="right-actions">
                    <button type="submit" class="btnx primary">🚀 Anonymize</button>
                </div>
            </div>
        </form>

        <!-- Result Panel -->
        <div class="anon-board">
            <div id="result-container" class="anon-output">
                <div class="bubble">
                    <h3 style="margin-top:0; font-size:1rem;">✅ Anonymized Text</h3>
                    <p class="muted" style="margin-bottom:0; opacity:0.7;">The result will appear after anonymization.</p>
                </div>
            </div>
        </div>

        {% raw %}
            <script>
                function highlightTags() {
                    const pre = document.getElementById('anonymized-result');
                    if (!pre) return;
                    const highlighted = pre.innerHTML.replace(
                        /(\{[A-Z]{2}[^}]*\})/g,
                        '<span class="anon-tag">$1</span>'
                    );
                    pre.innerHTML = highlighted;
                }

                document.body.addEventListener('htmx:afterSwap', function (e) {
                    if (e.detail && e.detail.target && e.detail.target.id === 'result-container') {
                        highlightTags();
                    }
                });
            </script>
        {% endraw %}
    </div>
{% endblock %}
