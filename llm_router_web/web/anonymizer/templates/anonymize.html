{% extends "base.html" %}
{% block content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/anonymize.css') }}">

    <div class="anon-workspace">
        <form id="anonymize-form"
              hx-post="{{ url_for('anonymize_web.process_text') }}"
              hx-target="#result-wrapper"
              hx-swap="innerHTML"
              hx-trigger="submit"
              hx-indicator="#loading-spinner">

            <header class="workspace-header">
                <div class="workspace-title">
                    <h2>{{ _('anon_title') }}</h2>
                    <div class="sub">{{ _('anon_sub') }}</div>
                </div>

                <div class="workspace-controls">
                    <select name="algorithm" class="selectx">
                        <option value="fast" selected>{{ _('algo_fast') }}</option>
                        <option value="pii_masking">{{ _('algo_pii') }}</option>
                        <option value="fast+pii">{{ _('algo_hybrid') }}</option>
                    </select>
                    <span id="loading-spinner" class="spinnerx"></span>
                    <button type="button" class="btnx" onclick="clearText()">{{ _('btn_clear') }}</button>
                    <button type="submit" class="btnx primary">{{ _('btn_anonymize') }}</button>
                </div>
            </header>

            <div id="anon-progress" class="anon-progress-bar"></div>

            <div class="editor-grid">
                <div class="editor-pane">
                    <div class="pane-label">{{ _('label_original') }}</div>
                    <textarea name="text" id="input-text"
                              placeholder="{{ _('placeholder_input') }}" required
                              class="inputx" style="height: 100%; resize: none;"></textarea>
                </div>

                <div class="editor-pane">
                    <div class="pane-label">
                        {{ _('label_result') }}
                        <div style="display:inline-flex; gap:0.4rem; align-items:center; margin-left:0.4rem;">
                            <button type="button" class="btnx" style="font-size:0.7rem; padding:0.2rem 0.6rem;"
                                    onclick="copyResult(this)">{{ _('btn_copy_text') }}</button>
                            <button type="button" class="btnx" style="font-size:0.7rem; padding:0.2rem 0.6rem;"
                                    onclick="copyMappings(this)">{{ _('btn_copy_mappings') }}</button>
                        </div>
                    </div>

                    <div id="result-wrapper">
                        {% if result %}
                            <div id="result-content" class="result-area"
                                 data-mappings='{{ result.mappings | tojson | safe }}'>{{ result.text | e }}</div>
                        {% else %}
                            <div id="result-content" class="result-area"><span
                                    style="opacity:0.5; font-style:italic;">{{ _('result_placeholder') }}</span></div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        window.ANON_CONFIG = {{ {'result_placeholder': _('result_placeholder')} | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/anonymize.js') }}"></script>
{% endblock %}
