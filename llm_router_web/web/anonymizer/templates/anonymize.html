{% extends "base_anonymizer.html" %}
{% block content %}
    <style>
        .anon-workspace {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .workspace-title h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .workspace-title .sub {
            margin-top: 0.3rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-glass);
        }

        @media (min-width: 820px) {
            .editor-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .editor-pane {
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1rem;
        }

        .editor-pane:first-child {
            border-right: 1px solid var(--border-glass);
        }

        .pane-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .inputx, .selectx {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            color: inherit;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .inputx:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99,179,237,0.1);
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .btnx {
            appearance: none;
            border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05);
            color: inherit;
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btnx:hover { background: rgba(255,255,255,0.1); }
        .btnx.primary {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
        }
        .btnx.primary:hover { background: var(--accent-hover); }

        .result-area {
            min-height: 200px;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border-glass);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .anon-tag {
            display: inline-block;
            padding: 0 0.4rem;
            border-radius: 4px;
            background: rgba(255,220,120,0.15);
            color: #ffe0a3;
            border: 1px solid rgba(255,220,120,0.3);
            font-family: monospace;
            font-weight: 700;
            font-size: 0.9em;
        }

        .spinnerx {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .spinnerx.active { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <div class="anon-workspace">
        <header class="workspace-header">
            <div class="workspace-title">
                <h2>🔒 Text Anonymization</h2>
                <div class="sub">Usuń dane wrażliwe przed wysłaniem tekstu do modelu AI.</div>
            </div>
        </header>

        <div class="editor-grid">
            <!-- Left Pane: Input -->
            <div class="editor-pane">
                <div class="pane-label">Original Text</div>
                <form id="anonymize-form"
                      hx-post="{{ url_for('anonymize_web.process_text') }}"
                      hx-target="#result-content"
                      hx-swap="innerHTML"
                      hx-trigger="submit"
                      hx-indicator="#loading-spinner"
                      style="display: contents;">

                    <textarea name="text" id="input-text"
                              placeholder="Wklej tekst tutaj..." required
                              class="inputx" rows="12"></textarea>

                    <div class="controls-bar">
                        <div style="display:flex; gap:0.5rem; align-items:center;">
                            <select name="algorithm" class="selectx" style="width: auto;">
                                <option value="fast" selected>Fast Masking</option>
                            </select>
                            <span id="loading-spinner" class="spinnerx"></span>
                        </div>
                        <button type="submit" class="btnx primary">🚀 Anonymize</button>
                    </div>
                </form>
            </div>

            <!-- Right Pane: Result -->
            <div class="editor-pane">
                <div class="pane-label">
                    Anonymized Result
                    <button class="btnx" style="font-size:0.7rem; padding: 0.2rem 0.6rem;" onclick="copyResult()">Copy</button>
                </div>
                <div id="result-content" class="result-area">
                    <span style="opacity: 0.5; font-style: italic;">Wynik pojawi się tutaj po przetworzeniu...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function highlightTags() {
            const container = document.getElementById('result-content');
            if (!container) return;
            container.innerHTML = container.innerHTML.replace(
                /(\{[A-Z]{2}[^}]*\})/g,
                '<span class="anon-tag">$1</span>'
            );
        }

        async function copyResult() {
            const text = document.getElementById('result-content').innerText;
            await navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }

        document.body.addEventListener('htmx:afterSwap', function (e) {
            if (e.detail?.target?.id === 'result-content') highlightTags();
        });
    </script>
{% endblock %}
