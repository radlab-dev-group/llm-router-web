{% extends "base_anonymizer.html" %}
{% block content %}
    <style>
        .anon-workspace {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .workspace-title h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .workspace-title .sub {
            margin-top: 0.3rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .workspace-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-glass);
            align-items: stretch;

            height: calc(100dvh - 260px);
            max-height: calc(100dvh - 260px);
            min-height: 320px;
        }

        @media (min-width: 820px) {
            .editor-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .editor-pane {
            display: grid;
            grid-template-rows: auto 1fr;
            padding: 1.5rem;
            gap: 1rem;
            overflow: hidden;
            height: 100%;
            min-height: 0;
        }

        .editor-pane:first-child {
            border-right: 1px solid var(--border-glass);
        }

        .pane-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        /* ---------- ELEMENTY TEKSTOWE (Synchronizowane) ---------- */
        .inputx, .result-area {
            width: 100%;
            height: 100%;
            min-height: 0;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            color: inherit;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            box-sizing: border-box;
            overflow: auto;
            resize: none;
            display: block;
            text-align: left;
            vertical-align: top;
        }

        .result-area {
            white-space: pre-wrap;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            flex-direction: column;
        }

        .inputx:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 179, 237, 0.1);
        }

        /* ---------- KONTROLY ---------- */
        .selectx {
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(0, 0, 0, 0.2);
            padding: 0.6rem;
            color: inherit;
            outline: none;
            font-family: inherit;
            font-size: 0.85rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
            cursor: pointer;
        }

        .btnx {
            appearance: none;
            border: 1px solid var(--border-glass);
            background: rgba(255, 255, 255, 0.05);
            color: inherit;
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btnx:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btnx.primary {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
        }

        .btnx.primary:hover {
            background: var(--accent-hover);
        }

        .anon-tag {
            display: inline-block;
            padding: 0 0.4rem;
            border-radius: 4px;
            background: rgba(255, 220, 120, 0.15);
            color: #ffe0a3;
            border: 1px solid rgba(255, 220, 120, 0.3);
            font-family: monospace;
            font-weight: 700;
            font-size: 0.9em;
        }

        .spinnerx {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .spinnerx.active {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <div class="anon-workspace">
        <form id="anonymize-form"
              hx-post="{{ url_for('anonymize_web.process_text') }}"
              hx-target="#result-content"
              hx-swap="innerHTML"
              hx-trigger="submit"
              hx-indicator="#loading-spinner">

            <header class="workspace-header">
                <div class="workspace-title">
                    <h2>🔒 Text Anonymization</h2>
                    <div class="sub">Usuń dane wrażliwe przed wysłaniem tekstu do modelu AI.</div>
                </div>

                <div class="workspace-controls">
                    <select name="algorithm" class="selectx">
                        <option value="fast" selected>Fast Masking</option>
                    </select>
                    <span id="loading-spinner" class="spinnerx"></span>
                    <button type="button" class="btnx" onclick="clearText()">🗑️ Clear</button>
                    <button type="submit" class="btnx primary">🚀 Anonymize</button>
                </div>
            </header>

            <div class="editor-grid">
                <div class="editor-pane">
                    <div class="pane-label">Original Text</div>
                    <textarea name="text" id="input-text"
                              placeholder="Wklej tekst tutaj..." required
                              class="inputx"></textarea>
                </div>

                <div class="editor-pane">
                    <div class="pane-label">
                        Anonymized Result
                        <button type="button" class="btnx"
                                style="font-size:0.7rem; padding:0.2rem 0.6rem;"
                                onclick="copyResult()">Copy
                        </button>
                    </div>
                    <div id="result-content" class="result-area">
                        <span style="opacity:0.5; font-style:italic;">
                            Wynik pojawi się tutaj po przetworzeniu...
                        </span>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        function highlightTags() {
            const container = document.getElementById('result-content');
            if (!container) return;
            container.innerHTML = container.innerHTML.replace(
                /(\{[A-Z]{2}[^}]*\})/g,
                '<span class="anon-tag">$1</span>'
            );
        }

        async function copyResult() {
            const text = document.getElementById('result-content').innerText;
            await navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }

        function clearText() {
            document.getElementById('input-text').value = '';
            document.getElementById('result-content').innerHTML =
                '<span style="opacity:0.5; font-style:italic;">Wynik pojawi się tutaj po przetworzeniu...</span>';
        }

        function syncScroll(source) {
            const targetId = source.id === 'input-text' ? 'result-content' : 'input-text';
            const target = document.getElementById(targetId);
            if (!target) return;

            if (target.scrollTop !== source.scrollTop || target.scrollLeft !== source.scrollLeft) {
                target.scrollTop = source.scrollTop;
                target.scrollLeft = source.scrollLeft;
            }
        }

        const inputEl = document.getElementById('input-text');
        const resultEl = document.getElementById('result-content');

        inputEl.addEventListener('scroll', function (e) {
            syncScroll(e.target);
        });
        resultEl.addEventListener('scroll', function (e) {
            syncScroll(e.target);
        });

        document.body.addEventListener('htmx:afterSwap', function (e) {
            if (e.detail?.target?.id === 'result-content') {
                highlightTags();

                // Po wstawieniu nowego wyniku przewiń go na górę (zamiast sync do textarea)
                const result = document.getElementById('result-content');
                if (result) {
                    result.scrollTop = 0;
                    result.scrollLeft = 0;
                }
            }
        });
    </script>
{% endblock %}
