{% extends "base.html" %}
{% block content %}
<h2>User management</h2>

<div class="panel">
    <h3>Create new user</h3>
    <form method="post" class="form">
        <label>Username
            <input type="text" name="username" required placeholder="New username" class="inputx">
        </label>
        <label>Password
            <input type="password" name="password" required class="inputx">
        </label>
        <label>Role
            <select name="role" class="selectx">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </label>
        <div class="form-actions">
            <button class="btnx primary" type="submit">Add</button>
        </div>
    </form>
</div>

<div class="panel">
    <h3>All users</h3>
    <div class="scroll-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.username }}</td>
                <td>{{ u.role }}</td>
                <td>{{ "Active" if u.is_active else "Blocked" }}</td>
                <td>
                    <div class="action-row">
                        <form method="post"
                              action="{{ url_for('edit_user', user_id=u.id) }}"
                              style="display:inline;">
                            <select name="role" class="selectx" style="max-width:80px;">
                                <option value="user" {% if u.role=='user' %}selected{% endif %}>User</option>
                                <option value="admin" {% if u.role=='admin' %}selected{% endif %}>Admin</option>
                            </select>
                            <button class="btnx btnx-small" type="submit">Change role</button>
                        </form>

                        <form method="post"
                              action="{{ url_for('edit_user', user_id=u.id) }}"
                              style="display:inline;">
                            <input type="password" name="new_password" placeholder="New password"
                                   class="inputx" style="max-width:120px;">
                            <input type="password" name="confirm_password" placeholder="Confirm"
                                   class="inputx" style="max-width:120px;">
                            <button class="btnx btnx-small" type="submit">Change password</button>
                        </form>

                        <form method="post"
                              action="{{ url_for('toggle_block_user', user_id=u.id) }}"
                              style="display:inline;">
                            <button class="btnx btnx-small {% if not u.is_active %}danger{% endif %}"
                                    type="submit">
                                {{ "Unblock" if not u.is_active else "Block" }}
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="muted">No users found.</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
