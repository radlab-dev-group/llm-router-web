{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width:500px;">
    <h2>Change Password</h2>
    <form method="post" class="form">
        <label>Current password
            <input type="password" name="current_password" required class="inputx">
        </label>
        <label>New password
            <input type="password" name="new_password" required class="inputx">
        </label>
        <label>Confirm new password
            <input type="password" name="confirm_password" required class="inputx">
        </label>
        <div class="form-actions">
            <button class="btnx primary" type="submit">Update password</button>
            <a class="btnx btnx-secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
