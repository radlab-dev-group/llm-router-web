{% extends "base.html" %}
{% block content %}
<div class="panel">
    <h2>Import config</h2>
    <form method="post" class="form" enctype="multipart/form-data">
        <label>Upload JSON file
            <input type="file" name="file" accept=".json" class="inputx">
        </label>
        <label>Or paste JSON text
            <textarea name="json" placeholder="Paste your configuration JSON here..." rows="10" class="inputx" style="font-family:var(--font-mono);"></textarea>
        </label>
        <label>Config name (optional, auto-generated if empty)
            <input type="text" name="name" placeholder="My imported config" class="inputx">
        </label>
        <label>Description (optional)
            <textarea name="description" placeholder="Describe this config..." rows="2" class="inputx"></textarea>
        </label>
        <div class="form-actions">
            <button class="btnx primary" type="submit">Import</button>
            <a class="btnx btnx-secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
