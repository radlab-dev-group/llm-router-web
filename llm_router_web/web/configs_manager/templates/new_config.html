{% extends "base.html" %}
{% block content %}
<div class="panel">
    <h2>Create new config</h2>
    <form method="post" class="form">
        <label>Config name
            <input type="text" name="name" placeholder="My new config" required class="inputx">
        </label>
        <label>Description (optional)
            <textarea name="description" placeholder="Describe this config..." rows="3" class="inputx"></textarea>
        </label>
        <div class="form-actions">
            <button class="btnx primary" type="submit">Create config</button>
            <a class="btnx btnx-secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
