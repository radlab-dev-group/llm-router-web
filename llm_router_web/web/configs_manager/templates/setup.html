{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width:500px;margin:2rem auto;">
    <h2>Setup administrator account</h2>
    <form method="post" class="form">
        <label>Username
            <input type="text" name="username" required placeholder="Admin username" class="inputx">
        </label>
        <label>Password
            <input type="password" name="password" required class="inputx">
        </label>
        <label>Confirm password
            <input type="password" name="confirm_password" required class="inputx">
        </label>
        <div class="form-actions">
            <button class="btnx primary" type="submit">Create admin</button>
        </div>
    </form>
</div>
{% endblock %}
